networks:
  ${STACK}_infra-net:
    external: true
  edge:
    external: true

services:
  api:
    image: ${APP_IMAGE}
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: any
        delay: 10s
      labels:
          - "traefik.enable=true"
          - "traefik.http.routers.${STACK}-api.entrypoints=websecure"
          - "traefik.http.routers.${STACK}-api.tls=true"
          - "traefik.http.routers.${STACK}-api.tls.certresolver=tlsresolver"
          - "traefik.http.routers.${STACK}-api.rule=Host(`${DOMAIN:?ERROR DOMAIN NOT SET}`)"
          - "traefik.http.services.${STACK}-api.loadbalancer.server.port=8000"
          - "traefik.swarm.network=edge"
    networks:
      - ${STACK}_infra-net
      - edge
    environment:
          - STACK=${STACK}
          - DOMAIN=${DOMAIN}
          - CELERY_BROKER_URL=${CELERY_BROKER_URL}  
          - SECRET_KEY=${SECRET_KEY}
          - DEBUG=${DEBUG}  # always set this to False on staging & production environments
          - ALLOWED_HOST=${ALLOWED_HOST}
          - FRONTEND_BASE_URL=${FRONTEND_BASE_URL}
          - DJANGO_ENV=${DJANGO_ENV}
          - LOGS_DIR_PATH=${LOGS_DIR_PATH}
          - LOG_VOLUME=${LOG_VOLUME}
          - PARTNER_PORTAL_WEBHOOK_URL=${PARTNER_PORTAL_WEBHOOK_URL}
          - POSTGRES_USER=${POSTGRES_USER}
          - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          - POSTGRES_HOST=${POSTGRES_HOST}
          - POSTGRES_PORT=${POSTGRES_PORT}
          - POSTGRES_DB=${POSTGRES_DB}
          - POSTGRES_SSLMODE=${POSTGRES_SSLMODE} # set this to require
          # - MAILTRAP_TOKEN=${MAILTRAP_TOKEN}
          # - EMAIL_SENDER=${EMAIL_SENDER}
          # - EMAIL_SENDER_NAME=${EMAIL_SENDER_NAME}            
    # healthcheck:
    #   test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health/ || exit 1"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 3
    
  healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health/ready/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  volumes:
      - ${LOG_VOLUME:?ERROR LOG_VOLUME NOT SET!}
